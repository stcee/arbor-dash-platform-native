<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #666;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #6b7280;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .container { text-align: center; }
  </style>
</head>
<body>
  <!--
    This file is a fallback that Capacitor requires (webDir must exist).
    In production, the app loads from the remote server URL configured
    in capacitor.config.ts — this page is never shown.
  -->
  <div class="container">
    <div class="spinner"></div>
    <p>Connecting to server...</p>
  </div>
</body>
</html>
