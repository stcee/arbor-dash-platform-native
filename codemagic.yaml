# =============================================================================
# codemagic.yaml — Per-tenant Capacitor 6 native builds
#
# Produces:
#   iOS     → signed IPA for App Store (unlisted)
#   Android → signed APK for sideloading
#
# Environment variable groups (set in Codemagic UI per build):
#   app_config:
#     APP_ID          = app.arbordash.bullard
#     APP_NAME        = Bullard Tree Care
#     COMPANY_CODE    = bullardtreecare
#     APP_ICON_URL    = https://your-cdn.com/icons/bullard-1024.png
#   webhook_config:
#     WEBHOOK_SECRET   = <shared secret for ArborDash API callback>
# =============================================================================

workflows:

  # ---------------------------------------------------------------------------
  # iOS Workflow
  # ---------------------------------------------------------------------------
  ios-build:
    name: iOS — App Store IPA
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: ArborDash

    environment:
      groups:
        - app_config
        - webhook_config

      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

      node: v20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-*"
          include: true

    scripts:

      - name: Install npm dependencies
        script: npm install

      - name: Ensure www dir exists
        script: |
          mkdir -p www
          [ -f www/index.html ] || echo '<html></html>' > www/index.html

      - name: Add iOS platform and sync
        script: |
          npx cap add ios 2>/dev/null || true
          npx cap sync ios

      - name: Install CocoaPods
        script: cd ios/App && pod install --repo-update

      - name: Patch Info.plist — permissions & app name
        script: |
          PLIST="ios/App/App/Info.plist"
          PB="/usr/libexec/PlistBuddy"

          # Location permissions (background geolocation)
          $PB -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string '${APP_NAME} tracks your location for crew management.'" "$PLIST" 2>/dev/null || \
          $PB -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription '${APP_NAME} tracks your location for crew management.'" "$PLIST"

          $PB -c "Add :NSLocationWhenInUseUsageDescription string '${APP_NAME} uses your location while in use.'" "$PLIST" 2>/dev/null || \
          $PB -c "Set :NSLocationWhenInUseUsageDescription '${APP_NAME} uses your location while in use.'" "$PLIST"

          $PB -c "Add :NSLocationAlwaysUsageDescription string '${APP_NAME} uses your location in the background for crew tracking.'" "$PLIST" 2>/dev/null || \
          $PB -c "Set :NSLocationAlwaysUsageDescription '${APP_NAME} uses your location in the background for crew tracking.'" "$PLIST"

          # Background modes: location + remote notifications
          $PB -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
          $PB -c "Add :UIBackgroundModes: string location" "$PLIST" 2>/dev/null || true
          $PB -c "Add :UIBackgroundModes: string remote-notification" "$PLIST" 2>/dev/null || true

          # App display name
          $PB -c "Set :CFBundleName ${APP_NAME}" "$PLIST" 2>/dev/null || \
          $PB -c "Add :CFBundleName string ${APP_NAME}" "$PLIST"
          $PB -c "Set :CFBundleDisplayName ${APP_NAME}" "$PLIST" 2>/dev/null || \
          $PB -c "Add :CFBundleDisplayName string ${APP_NAME}" "$PLIST"

      - name: Set up push notification entitlements
        script: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          PB="/usr/libexec/PlistBuddy"

          if [ ! -f "$ENTITLEMENTS" ]; then
            cat > "$ENTITLEMENTS" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict/>
          </plist>
          EOF
          fi

          $PB -c "Add :aps-environment string production" "$ENTITLEMENTS" 2>/dev/null || \
          $PB -c "Set :aps-environment production" "$ENTITLEMENTS"

      - name: Inject app icon
        script: |
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          curl -L -o /tmp/AppIcon-1024.png "$APP_ICON_URL"

          # Generate all required iOS icon sizes using sips (built into macOS)
          for SPEC in "20:Icon-20" "40:Icon-20@2x" "60:Icon-20@3x" \
                      "29:Icon-29" "58:Icon-29@2x" "87:Icon-29@3x" \
                      "40:Icon-40" "80:Icon-40@2x" "120:Icon-40@3x" \
                      "120:Icon-60@2x" "180:Icon-60@3x" \
                      "76:Icon-76" "152:Icon-76@2x" "167:Icon-83.5@2x" \
                      "1024:Icon-1024"; do
            SIZE="${SPEC%%:*}"
            NAME="${SPEC##*:}"
            sips -z "$SIZE" "$SIZE" /tmp/AppIcon-1024.png --out "${ICON_DIR}/${NAME}.png" > /dev/null
          done

          cat > "${ICON_DIR}/Contents.json" <<'EOF'
          {
            "images": [
              {"size":"20x20","idiom":"iphone","filename":"Icon-20@2x.png","scale":"2x"},
              {"size":"20x20","idiom":"iphone","filename":"Icon-20@3x.png","scale":"3x"},
              {"size":"29x29","idiom":"iphone","filename":"Icon-29@2x.png","scale":"2x"},
              {"size":"29x29","idiom":"iphone","filename":"Icon-29@3x.png","scale":"3x"},
              {"size":"40x40","idiom":"iphone","filename":"Icon-40@2x.png","scale":"2x"},
              {"size":"40x40","idiom":"iphone","filename":"Icon-40@3x.png","scale":"3x"},
              {"size":"60x60","idiom":"iphone","filename":"Icon-60@2x.png","scale":"2x"},
              {"size":"60x60","idiom":"iphone","filename":"Icon-60@3x.png","scale":"3x"},
              {"size":"20x20","idiom":"ipad","filename":"Icon-20.png","scale":"1x"},
              {"size":"20x20","idiom":"ipad","filename":"Icon-20@2x.png","scale":"2x"},
              {"size":"29x29","idiom":"ipad","filename":"Icon-29.png","scale":"1x"},
              {"size":"29x29","idiom":"ipad","filename":"Icon-29@2x.png","scale":"2x"},
              {"size":"40x40","idiom":"ipad","filename":"Icon-40.png","scale":"1x"},
              {"size":"40x40","idiom":"ipad","filename":"Icon-40@2x.png","scale":"2x"},
              {"size":"76x76","idiom":"ipad","filename":"Icon-76.png","scale":"1x"},
              {"size":"76x76","idiom":"ipad","filename":"Icon-76@2x.png","scale":"2x"},
              {"size":"83.5x83.5","idiom":"ipad","filename":"Icon-83.5@2x.png","scale":"2x"},
              {"size":"1024x1024","idiom":"ios-marketing","filename":"Icon-1024.png","scale":"1x"}
            ],
            "info": {"version":1,"author":"codemagic"}
          }
          EOF

      - name: Fetch or create signing files
        script: |
          # Initialize keychain — must exist before certs can be saved
          keychain initialize
          # Fetch or create certificate + provisioning profile.
          # Uses CERTIFICATE_PRIVATE_KEY env var for cert creation.
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose
          # Install certs into keychain and apply profiles to Xcode project
          keychain add-certificates
          xcode-project use-profiles

      - name: Resolve App Store Connect app ID
        script: |
          # APP_STORE_APP_ID may already be passed from the ArborDash API.
          # If not, try to resolve it from App Store Connect.
          if [ -z "$APP_STORE_APP_ID" ]; then
            APP_STORE_APP_ID=$(app-store-connect apps list \
              --bundle-id-identifier "$APP_ID" --jsonapi \
              2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['id'] if d.get('data') else '')" \
              2>/dev/null || true)
          fi
          if [ -n "$APP_STORE_APP_ID" ]; then
            echo "APP_STORE_APP_ID=$APP_STORE_APP_ID" >> $CM_ENV
            echo "Resolved APP_STORE_APP_ID: $APP_STORE_APP_ID"
          else
            echo "WARNING: Could not resolve APP_STORE_APP_ID — will use build number 1"
          fi

      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          if [ -n "$APP_STORE_APP_ID" ]; then
            LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo "0")
          else
            LATEST="0"
          fi
          NEXT=$(($LATEST + 1))
          agvtool new-version -all "$NEXT"
          echo "Build number: $NEXT"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

      - name: Set App Store metadata
        script: |
          set -e

          # Generate a JWT for direct API calls
          JWT=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" \
            --json 2>/dev/null | echo "skip" || true)
          # Use the CLI's cached token — it's stored after any CLI command
          TOKEN_FILE="$HOME/.app-store-connect/token"

          # Helper: make API calls using the Codemagic CLI's auth
          api() {
            local METHOD="$1" URL="$2" DATA="$3"
            app-store-connect api "$METHOD" "$URL" ${DATA:+--data "$DATA"} 2>/dev/null || \
            curl -s -X "$METHOD" \
              -H "Authorization: Bearer $(app-store-connect get-jwt 2>/dev/null || echo '')" \
              -H "Content-Type: application/json" \
              ${DATA:+-d "$DATA"} \
              "https://api.appstoreconnect.apple.com$URL"
          }

          echo "=== Setting metadata for ${APP_NAME} (${APP_ID}) ==="

          # --- Get App Store Version ID ---
          VERSION_INFO=$(app-store-connect apps app-store-versions list \
            --app-id "$APP_STORE_APP_ID" \
            --version-string "1.0" \
            --jsonapi 2>/dev/null || true)
          VERSION_ID=$(echo "$VERSION_INFO" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            items=d.get('data',[])
            for i in items:
              if i.get('attributes',{}).get('versionString')=='1.0':
                print(i['id']); break
            else:
              if items: print(items[0]['id'])
          except: pass
          " 2>/dev/null || true)

          if [ -z "$VERSION_ID" ]; then
            echo "WARNING: Could not find App Store version — skipping metadata"
            exit 0
          fi
          echo "App Store Version ID: $VERSION_ID"

          # --- Set Version Localizations (description, keywords, support URL) ---
          echo "Setting version localizations..."
          app-store-connect app-store-version-localizations create \
            --app-store-version-id "$VERSION_ID" \
            --locale "en-US" \
            --description "Crew management and scheduling app for ${APP_NAME}. Manage jobs, schedules, estimates, invoices, and team coordination — all from your mobile device." \
            --keywords "crew management,scheduling,field service,tree care,landscaping,job tracking" \
            --support-url "https://arbordash.app/support" \
            --whats-new "Initial release" \
            2>/dev/null || \
          app-store-connect app-store-version-localizations modify \
            --description "Crew management and scheduling app for ${APP_NAME}. Manage jobs, schedules, estimates, invoices, and team coordination — all from your mobile device." \
            --keywords "crew management,scheduling,field service,tree care,landscaping,job tracking" \
            --support-url "https://arbordash.app/support" \
            --whats-new "Initial release" \
            "$VERSION_ID" \
            2>/dev/null || echo "WARNING: Could not set version localizations"

          # --- Set App Info (privacy policy, category, copyright) ---
          echo "Setting app info..."
          APP_INFO=$(curl -s \
            -H "Authorization: Bearer $(app-store-connect get-jwt 2>/dev/null)" \
            "https://api.appstoreconnect.apple.com/v1/apps/$APP_STORE_APP_ID/appInfos?limit=1")
          APP_INFO_ID=$(echo "$APP_INFO" | python3 -c "
          import sys,json
          try: print(json.load(sys.stdin)['data'][0]['id'])
          except: pass
          " 2>/dev/null || true)

          if [ -n "$APP_INFO_ID" ]; then
            # Set primary category to Business
            curl -s -X PATCH \
              -H "Authorization: Bearer $(app-store-connect get-jwt 2>/dev/null)" \
              -H "Content-Type: application/json" \
              "https://api.appstoreconnect.apple.com/v1/appInfos/$APP_INFO_ID" \
              -d '{
                "data": {
                  "id": "'"$APP_INFO_ID"'",
                  "type": "appInfos",
                  "relationships": {
                    "primaryCategory": {
                      "data": { "type": "appCategories", "id": "BUSINESS" }
                    }
                  }
                }
              }' > /dev/null 2>&1 || echo "WARNING: Could not set category"

            # Get app info localization ID
            LOCALIZATIONS=$(curl -s \
              -H "Authorization: Bearer $(app-store-connect get-jwt 2>/dev/null)" \
              "https://api.appstoreconnect.apple.com/v1/appInfos/$APP_INFO_ID/appInfoLocalizations")
            LOC_ID=$(echo "$LOCALIZATIONS" | python3 -c "
            import sys,json
            try:
              for l in json.load(sys.stdin)['data']:
                if l.get('attributes',{}).get('locale','').startswith('en'):
                  print(l['id']); break
              else: print(json.load(sys.stdin)['data'][0]['id'])
            except: pass
            " 2>/dev/null || true)

            if [ -n "$LOC_ID" ]; then
              curl -s -X PATCH \
                -H "Authorization: Bearer $(app-store-connect get-jwt 2>/dev/null)" \
                -H "Content-Type: application/json" \
                "https://api.appstoreconnect.apple.com/v1/appInfoLocalizations/$LOC_ID" \
                -d '{
                  "data": {
                    "id": "'"$LOC_ID"'",
                    "type": "appInfoLocalizations",
                    "attributes": {
                      "privacyPolicyUrl": "https://arbordash.app/privacy"
                    }
                  }
                }' > /dev/null 2>&1 || echo "WARNING: Could not set privacy policy"
            fi
          fi

          # --- Set Age Rating (all NONE for a business app) ---
          echo "Setting age rating..."
          AGE_RATING_DATA=$(curl -s \
            -H "Authorization: Bearer $(app-store-connect get-jwt 2>/dev/null)" \
            "https://api.appstoreconnect.apple.com/v1/appStoreVersions/$VERSION_ID/ageRatingDeclaration")
          AGE_RATING_ID=$(echo "$AGE_RATING_DATA" | python3 -c "
          import sys,json
          try: print(json.load(sys.stdin)['data']['id'])
          except: pass
          " 2>/dev/null || true)

          if [ -n "$AGE_RATING_ID" ]; then
            curl -s -X PATCH \
              -H "Authorization: Bearer $(app-store-connect get-jwt 2>/dev/null)" \
              -H "Content-Type: application/json" \
              "https://api.appstoreconnect.apple.com/v1/ageRatingDeclarations/$AGE_RATING_ID" \
              -d '{
                "data": {
                  "id": "'"$AGE_RATING_ID"'",
                  "type": "ageRatingDeclarations",
                  "attributes": {
                    "alcoholTobaccoOrDrugUseOrReferences": "NONE",
                    "contests": "NONE",
                    "gamblingSimulated": "NONE",
                    "gambling": false,
                    "horrorOrFearThemes": "NONE",
                    "matureOrSuggestiveThemes": "NONE",
                    "medicalOrTreatmentInformation": "NONE",
                    "profanityOrCrudeHumor": "NONE",
                    "sexualContentGraphicAndNudity": "NONE",
                    "sexualContentOrNudity": "NONE",
                    "violenceCartoonOrFantasy": "NONE",
                    "violenceRealistic": "NONE",
                    "violenceRealisticProlongedGraphicOrSadistic": "NONE",
                    "unrestrictedWebAccess": false,
                    "ageRatingOverride": null
                  }
                }
              }' > /dev/null 2>&1 || echo "WARNING: Could not set age rating"
          fi

          # --- Set App Store Review Details ---
          echo "Setting review details..."
          curl -s -X POST \
            -H "Authorization: Bearer $(app-store-connect get-jwt 2>/dev/null)" \
            -H "Content-Type: application/json" \
            "https://api.appstoreconnect.apple.com/v1/appStoreReviewDetails" \
            -d '{
              "data": {
                "type": "appStoreReviewDetails",
                "attributes": {
                  "contactFirstName": "Rick",
                  "contactLastName": "Courcy",
                  "contactEmail": "rick@madebyrick.com",
                  "contactPhone": "+1-555-0100",
                  "demoAccountRequired": false,
                  "notes": "This is a white-labeled crew management app for '"${APP_NAME}"'. It is intended for unlisted distribution to the company'"'"'s employees only, not for public release."
                },
                "relationships": {
                  "appStoreVersion": {
                    "data": { "type": "appStoreVersions", "id": "'"$VERSION_ID"'" }
                  }
                }
              }
            }' > /dev/null 2>&1 || echo "WARNING: Could not set review details"

          echo "=== Metadata setup complete ==="

      - name: Upload App Store screenshots
        script: |
          set -e
          echo "=== Uploading screenshots for ${APP_NAME} ==="

          JWT=$(app-store-connect get-jwt 2>/dev/null)
          API="https://api.appstoreconnect.apple.com/v1"

          # Get version ID
          VERSION_ID="$APP_STORE_APP_ID"  # Will be resolved below
          VERSION_INFO=$(curl -s -H "Authorization: Bearer $JWT" \
            "$API/apps/$APP_STORE_APP_ID/appStoreVersions?filter[versionString]=1.0&limit=1")
          VERSION_ID=$(echo "$VERSION_INFO" | python3 -c "
          import sys,json
          try: print(json.load(sys.stdin)['data'][0]['id'])
          except: pass
          " 2>/dev/null || true)

          if [ -z "$VERSION_ID" ]; then
            echo "WARNING: Could not find App Store version — skipping screenshots"
            exit 0
          fi

          # Get localization ID
          LOCS=$(curl -s -H "Authorization: Bearer $JWT" \
            "$API/appStoreVersions/$VERSION_ID/appStoreVersionLocalizations")
          LOC_ID=$(echo "$LOCS" | python3 -c "
          import sys,json
          try:
            for l in json.load(sys.stdin)['data']:
              if l.get('attributes',{}).get('locale','').startswith('en'):
                print(l['id']); break
          except: pass
          " 2>/dev/null || true)

          if [ -z "$LOC_ID" ]; then
            echo "WARNING: No en-US localization found — skipping screenshots"
            exit 0
          fi

          upload_screenshot() {
            local DISPLAY_TYPE="$1" FILE_PATH="$2"
            local FILE_NAME=$(basename "$FILE_PATH")
            local FILE_SIZE=$(stat -f%z "$FILE_PATH" 2>/dev/null || stat -c%s "$FILE_PATH" 2>/dev/null)

            echo "Uploading $FILE_NAME as $DISPLAY_TYPE ($FILE_SIZE bytes)..."

            # Check if screenshot set exists
            SETS=$(curl -s -H "Authorization: Bearer $JWT" \
              "$API/appStoreVersionLocalizations/$LOC_ID/appScreenshotSets")
            SET_ID=$(echo "$SETS" | python3 -c "
            import sys,json
            dt='$DISPLAY_TYPE'
            try:
              for s in json.load(sys.stdin)['data']:
                if s.get('attributes',{}).get('screenshotDisplayType')==dt:
                  print(s['id']); break
            except: pass
            " 2>/dev/null || true)

            # Create screenshot set if needed
            if [ -z "$SET_ID" ]; then
              SET_RESP=$(curl -s -X POST -H "Authorization: Bearer $JWT" \
                -H "Content-Type: application/json" "$API/appScreenshotSets" \
                -d '{
                  "data": {
                    "type": "appScreenshotSets",
                    "attributes": { "screenshotDisplayType": "'"$DISPLAY_TYPE"'" },
                    "relationships": {
                      "appStoreVersionLocalization": {
                        "data": { "type": "appStoreVersionLocalizations", "id": "'"$LOC_ID"'" }
                      }
                    }
                  }
                }')
              SET_ID=$(echo "$SET_RESP" | python3 -c "
              import sys,json
              try: print(json.load(sys.stdin)['data']['id'])
              except: pass
              " 2>/dev/null || true)
            fi

            if [ -z "$SET_ID" ]; then
              echo "WARNING: Could not create screenshot set for $DISPLAY_TYPE"
              return
            fi

            # Reserve screenshot
            RESERVE=$(curl -s -X POST -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" "$API/appScreenshots" \
              -d '{
                "data": {
                  "type": "appScreenshots",
                  "attributes": {
                    "fileName": "'"$FILE_NAME"'",
                    "fileSize": '"$FILE_SIZE"'
                  },
                  "relationships": {
                    "appScreenshotSet": {
                      "data": { "type": "appScreenshotSets", "id": "'"$SET_ID"'" }
                    }
                  }
                }
              }')

            SCREENSHOT_ID=$(echo "$RESERVE" | python3 -c "
            import sys,json
            try: print(json.load(sys.stdin)['data']['id'])
            except: pass
            " 2>/dev/null || true)

            UPLOAD_URL=$(echo "$RESERVE" | python3 -c "
            import sys,json
            try:
              ops=json.load(sys.stdin)['data']['attributes']['uploadOperations']
              print(ops[0]['url'])
            except: pass
            " 2>/dev/null || true)

            UPLOAD_HEADERS=$(echo "$RESERVE" | python3 -c "
            import sys,json
            try:
              ops=json.load(sys.stdin)['data']['attributes']['uploadOperations']
              for h in ops[0].get('requestHeaders',[]):
                print(h['name']+': '+h['value'])
            except: pass
            " 2>/dev/null || true)

            if [ -z "$SCREENSHOT_ID" ] || [ -z "$UPLOAD_URL" ]; then
              echo "WARNING: Could not reserve screenshot upload for $DISPLAY_TYPE"
              echo "Response: $RESERVE"
              return
            fi

            # Upload the file
            HEADER_ARGS=""
            while IFS= read -r line; do
              [ -n "$line" ] && HEADER_ARGS="$HEADER_ARGS -H \"$line\""
            done <<< "$UPLOAD_HEADERS"

            eval curl -s -X PUT "$UPLOAD_URL" $HEADER_ARGS --data-binary "@$FILE_PATH" > /dev/null 2>&1

            # Commit the upload
            curl -s -X PATCH -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              "$API/appScreenshots/$SCREENSHOT_ID" \
              -d '{
                "data": {
                  "id": "'"$SCREENSHOT_ID"'",
                  "type": "appScreenshots",
                  "attributes": { "uploaded": true, "sourceFileChecksum": null }
                }
              }' > /dev/null 2>&1

            echo "Uploaded $FILE_NAME for $DISPLAY_TYPE"
          }

          # Upload iPhone 6.5" screenshot
          IPHONE_SCREENSHOT="$CM_BUILD_DIR/screenshots/iOS/arbordash-iphone-screenshot.png"
          if [ -f "$IPHONE_SCREENSHOT" ]; then
            upload_screenshot "APP_IPHONE_65" "$IPHONE_SCREENSHOT"
          else
            echo "WARNING: iPhone screenshot not found at $IPHONE_SCREENSHOT"
          fi

          # Upload iPad Pro 12.9" screenshot
          IPAD_SCREENSHOT="$CM_BUILD_DIR/screenshots/iOS/arbordash-ipad-screenshot.png"
          if [ -f "$IPAD_SCREENSHOT" ]; then
            upload_screenshot "APP_IPAD_PRO_3GEN_129" "$IPAD_SCREENSHOT"
          else
            echo "WARNING: iPad screenshot not found at $IPAD_SCREENSHOT"
          fi

          echo "=== Screenshot upload complete ==="

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - rick@madebyrick.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: true
      scripts:
        - name: Notify ArborDash API on build completion
          script: |
            # CM_BUILD_STEP_STATUS is the authoritative source — "success" or "failure"
            if [ "${CM_BUILD_STEP_STATUS}" = "success" ]; then
              BUILD_RESULT="success"
            else
              BUILD_RESULT="failure"
            fi
            echo "Build result: ${BUILD_RESULT} (step status: ${CM_BUILD_STEP_STATUS})"
            curl -s -X POST "https://api.arbordash.app/api/app-builds/webhook" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${WEBHOOK_SECRET}" \
              --data '{
                "buildId": "'"${CM_BUILD_ID}"'",
                "status": "'"${BUILD_RESULT}"'",
                "artifactLinks": '"${CM_ARTIFACT_LINKS:-[]}"',
                "companyCode": "'"${COMPANY_CODE}"'",
                "appName": "'"${APP_NAME}"'",
                "arbordashBuildId": "'"${ARBORDASH_BUILD_ID}"'"
              }' || true

  # ---------------------------------------------------------------------------
  # Android Workflow
  # ---------------------------------------------------------------------------
  android-build:
    name: Android — Signed APK
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      android_signing:
        - arbordash_keystore

      groups:
        - app_config
        - webhook_config

      node: v20
      java: 17

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "android-*"
          include: true

    scripts:

      - name: Install npm dependencies
        script: npm install

      - name: Ensure www dir exists
        script: |
          mkdir -p www
          [ -f www/index.html ] || echo '<html></html>' > www/index.html

      - name: Add Android platform and sync
        script: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Inject google-services.json and FCM Gradle plugin
        script: |
          if [ -n "${GOOGLE_SERVICES_JSON}" ]; then
            echo "${GOOGLE_SERVICES_JSON}" > android/app/google-services.json
            echo "google-services.json written for FCM push notifications"

            # Add Google Services Gradle plugin to project-level build.gradle
            ROOT_GRADLE="android/build.gradle"
            if ! grep -q "com.google.gms" "$ROOT_GRADLE"; then
              sed -i.bak "s|classpath 'com.android.tools.build:gradle:|classpath 'com.google.gms:google-services:4.4.2'\n            classpath 'com.android.tools.build:gradle:|" "$ROOT_GRADLE"
              echo "Added google-services classpath to root build.gradle"
            fi

            # Apply the plugin in app-level build.gradle
            APP_GRADLE="android/app/build.gradle"
            if ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
              echo "" >> "$APP_GRADLE"
              echo "apply plugin: 'com.google.gms.google-services'" >> "$APP_GRADLE"
              echo "Added google-services plugin to app build.gradle"
            fi

            # Add Firebase Messaging dependency
            if ! grep -q "firebase-messaging" "$APP_GRADLE"; then
              sed -i.bak "/^dependencies {/a\\    implementation platform('com.google.firebase:firebase-bom:33.7.0')\n    implementation 'com.google.firebase:firebase-messaging'" "$APP_GRADLE"
              echo "Added Firebase Messaging dependencies"
            fi
          else
            echo "WARNING: No GOOGLE_SERVICES_JSON — push notifications will not work"
          fi

      - name: Set Android SDK location
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Patch AndroidManifest.xml
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # App display name
          sed -i.bak "s/android:label=\"[^\"]*\"/android:label=\"${APP_NAME}\"/" "$MANIFEST"

          # Background geolocation permissions
          for PERM in "ACCESS_FINE_LOCATION" "ACCESS_BACKGROUND_LOCATION" \
                      "FOREGROUND_SERVICE" "FOREGROUND_SERVICE_LOCATION" \
                      "POST_NOTIFICATIONS"; do
            if ! grep -q "$PERM" "$MANIFEST"; then
              sed -i.bak "s|<application|<uses-permission android:name=\"android.permission.${PERM}\"/>\n    <application|" "$MANIFEST"
            fi
          done

      - name: Inject Android app icon
        script: |
          curl -L -o /tmp/ic_launcher_master.png "$APP_ICON_URL"
          RES_DIR="android/app/src/main/res"

          # Remove adaptive icon XML files — Capacitor generates these by default
          # and they override any PNG ic_launcher files. We want our branded PNGs.
          find "$RES_DIR" -path "*/mipmap-anydpi-v26/ic_launcher*.xml" -delete 2>/dev/null || true
          rm -f "$RES_DIR/drawable/ic_launcher_background.xml" 2>/dev/null || true
          rm -f "$RES_DIR/drawable-v24/ic_launcher_foreground.xml" 2>/dev/null || true
          rm -f "$RES_DIR/drawable/ic_launcher_foreground.xml" 2>/dev/null || true

          for SPEC in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" \
                      "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            FOLDER="${SPEC%%:*}"
            SIZE="${SPEC##*:}"
            mkdir -p "${RES_DIR}/${FOLDER}"
            sips -z "$SIZE" "$SIZE" /tmp/ic_launcher_master.png \
              --out "${RES_DIR}/${FOLDER}/ic_launcher.png" > /dev/null
            cp "${RES_DIR}/${FOLDER}/ic_launcher.png" \
               "${RES_DIR}/${FOLDER}/ic_launcher_round.png"
          done

      - name: Set version and signing config
        script: |
          GRADLE="android/app/build.gradle"

          # Inject version
          sed -i.bak "s/versionCode .*/versionCode $BUILD_NUMBER/" "$GRADLE"
          sed -i.bak "s/versionName .*/versionName \"1.0.$BUILD_NUMBER\"/" "$GRADLE"

          # Debug: show available CM signing env vars
          echo "CM_KEYSTORE_PATH=${CM_KEYSTORE_PATH:-not set}"
          echo "CM_KEYSTORE=${CM_KEYSTORE:-not set}"
          echo "CM_KEY_ALIAS=${CM_KEY_ALIAS:-not set}"

          # Resolve keystore path (Codemagic uses CM_KEYSTORE_PATH or CM_KEYSTORE)
          KS_PATH="${CM_KEYSTORE_PATH:-$CM_KEYSTORE}"
          if [ -z "$KS_PATH" ] || [ ! -f "$KS_PATH" ]; then
            echo "ERROR: No keystore found at CM_KEYSTORE_PATH or CM_KEYSTORE"
            exit 1
          fi

          # Inject signing config with actual values (shell-expanded)
          cat >> "$GRADLE" <<SIGNING

          android {
              signingConfigs {
                  release {
                      storeFile file("${KS_PATH}")
                      storePassword "${CM_KEYSTORE_PASSWORD}"
                      keyAlias "${CM_KEY_ALIAS}"
                      keyPassword "${CM_KEY_PASSWORD}"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          SIGNING

      - name: Build signed APK
        script: cd android && ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - rick@madebyrick.com
        notify:
          success: true
          failure: true
      scripts:
        - name: Notify ArborDash API on build completion
          script: |
            if [ "${CM_BUILD_STEP_STATUS}" = "success" ]; then
              BUILD_RESULT="success"
            else
              BUILD_RESULT="failure"
            fi
            echo "Build result: ${BUILD_RESULT} (step status: ${CM_BUILD_STEP_STATUS})"
            curl -s -X POST "https://api.arbordash.app/api/app-builds/webhook" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${WEBHOOK_SECRET}" \
              --data '{
                "buildId": "'"${CM_BUILD_ID}"'",
                "status": "'"${BUILD_RESULT}"'",
                "artifactLinks": '"${CM_ARTIFACT_LINKS:-[]}"',
                "companyCode": "'"${COMPANY_CODE}"'",
                "appName": "'"${APP_NAME}"'",
                "arbordashBuildId": "'"${ARBORDASH_BUILD_ID}"'"
              }' || true
