# =============================================================================
# codemagic.yaml — Per-tenant Capacitor 6 native builds
#
# Produces:
#   iOS     → signed IPA for App Store (unlisted)
#   Android → signed APK for sideloading
#
# Environment variable groups (set in Codemagic UI per build):
#   app_config:
#     APP_ID          = app.arbordash.bullard
#     APP_NAME        = Bullard Tree Care
#     COMPANY_CODE    = bullardtreecare
#     APP_ICON_URL    = https://your-cdn.com/icons/bullard-1024.png
#   webhook_config:
#     WEBHOOK_SECRET   = <shared secret for ArborDash API callback>
# =============================================================================

workflows:

  # ---------------------------------------------------------------------------
  # iOS Workflow
  # ---------------------------------------------------------------------------
  ios-build:
    name: iOS — App Store IPA
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: ArborDash

    environment:
      groups:
        - app_config
        - webhook_config

      vars:
        # Capacitor 8 uses Swift Package Manager (no .xcworkspace, no CocoaPods).
        # Build target is the project file directly.
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"

      node: v22
      xcode: latest

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-*"
          include: true

    scripts:

      - name: Install npm dependencies
        script: npm install

      - name: Ensure www dir exists
        script: |
          mkdir -p www
          [ -f www/index.html ] || echo '<html></html>' > www/index.html

      - name: Add iOS platform and sync
        script: |
          # Do NOT suppress errors here — if cap add fails, the next step
          # will fail with a misleading "No Podfile" error. Let cap's
          # actual failure surface.
          set -e
          if [ -d "ios/App" ]; then
            echo "ios/App already exists — skipping cap add ios"
          else
            echo "Running cap add ios..."
            npx cap add ios
          fi
          echo "Running cap sync ios..."
          npx cap sync ios
          echo "Verifying ios/App/Podfile exists..."
          ls -la ios/App/ || true
          # Capacitor 8 uses Swift Package Manager — no Podfile is generated.
          # Verify the Xcode project + SPM package exist instead.
          if [ ! -d "ios/App/App.xcodeproj" ]; then
            echo "ERROR: ios/App/App.xcodeproj missing after cap add/sync"
            exit 1
          fi
          if [ ! -d "ios/App/CapApp-SPM" ]; then
            echo "ERROR: ios/App/CapApp-SPM missing — Capacitor SPM package not generated"
            exit 1
          fi

      # Capacitor 8 uses Swift Package Manager. xcodebuild can't read build
      # settings until SPM packages are resolved, so do that explicitly here
      # before any tooling tries to invoke -showBuildSettings (build-ipa,
      # agvtool, signing, etc).
      - name: Resolve Swift Package dependencies
        script: |
          set -e
          cd ios/App
          echo "Listing available schemes:"
          xcodebuild -list -project App.xcodeproj || true
          echo "Resolving SPM packages..."
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App
          echo "Verifying build settings can be read..."
          xcodebuild -showBuildSettings \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            > /dev/null

      - name: Patch Info.plist — permissions & app name
        script: |
          PLIST="ios/App/App/Info.plist"
          PB="/usr/libexec/PlistBuddy"

          # Location permissions (background geolocation).
          # Apple Guideline 5.1.1(ii) requires purpose strings to clearly explain
          # the use AND give a concrete example. Generic strings like "tracks your
          # location for crew management" are rejected.
          LOC_ALWAYS_AND_WHEN_IN_USE="${APP_NAME} uses your location to show your real-time position on the crew map so dispatchers and teammates can see where you are between jobs, automatically log job-site arrival and departure times for accurate timesheets, and record GPS coordinates for each tree care service performed at customer properties. For example, when you start a job at a customer's property, your location is recorded so the office can confirm arrival times and the route taken between job sites."
          LOC_WHEN_IN_USE="${APP_NAME} uses your current location to verify you are at the correct customer property when starting or completing a job, attach GPS coordinates to service records, and display nearby jobs on the crew map. For example, tapping 'Clock In' at a tree-pruning appointment captures the property's GPS coordinates so the office knows you arrived on time."
          LOC_ALWAYS="${APP_NAME} uses your location in the background to keep the crew map updated while you drive between jobs and to log accurate arrival times even when the app is not on screen. For example, when driving from one customer property to the next, the dispatcher can see your live route and ETA without you having to open the app."

          $PB -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string '${LOC_ALWAYS_AND_WHEN_IN_USE}'" "$PLIST" 2>/dev/null || \
          $PB -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription '${LOC_ALWAYS_AND_WHEN_IN_USE}'" "$PLIST"

          $PB -c "Add :NSLocationWhenInUseUsageDescription string '${LOC_WHEN_IN_USE}'" "$PLIST" 2>/dev/null || \
          $PB -c "Set :NSLocationWhenInUseUsageDescription '${LOC_WHEN_IN_USE}'" "$PLIST"

          $PB -c "Add :NSLocationAlwaysUsageDescription string '${LOC_ALWAYS}'" "$PLIST" 2>/dev/null || \
          $PB -c "Set :NSLocationAlwaysUsageDescription '${LOC_ALWAYS}'" "$PLIST"

          # Microphone — Twilio Voice in-app calls. Required if the user picks
          # up an incoming customer call from the dashboard. Same purpose-string
          # rule as location: must explain + give an example.
          MIC_DESC="${APP_NAME} uses the microphone so you can answer or place customer phone calls inside the app using the built-in softphone. For example, when a customer calls your business number and you tap 'Answer' on the incoming-call screen, the microphone captures your voice for the conversation."
          $PB -c "Add :NSMicrophoneUsageDescription string '${MIC_DESC}'" "$PLIST" 2>/dev/null || \
          $PB -c "Set :NSMicrophoneUsageDescription '${MIC_DESC}'" "$PLIST"

          # Camera — used for taking job-site photos and signing forms. Even
          # if not currently triggered, Capacitor's WebKit may surface a prompt
          # for getUserMedia + video, so a string belongs here. Cheap insurance
          # against future rejections.
          CAM_DESC="${APP_NAME} uses the camera so you can take photos of trees, hazards, and completed work directly from a job and attach them to estimates, invoices, and service records. For example, after pruning a tree you can tap 'Add Photo' on the job and the camera captures the result for the customer's report."
          $PB -c "Add :NSCameraUsageDescription string '${CAM_DESC}'" "$PLIST" 2>/dev/null || \
          $PB -c "Set :NSCameraUsageDescription '${CAM_DESC}'" "$PLIST"

          # Photo library — used when picking existing photos to attach.
          PHOTO_DESC="${APP_NAME} accesses your photo library so you can attach existing job-site photos to estimates, invoices, and service records. For example, if you took a photo of damage earlier on your phone's default camera, you can select it from your library to include in the customer's quote."
          $PB -c "Add :NSPhotoLibraryUsageDescription string '${PHOTO_DESC}'" "$PLIST" 2>/dev/null || \
          $PB -c "Set :NSPhotoLibraryUsageDescription '${PHOTO_DESC}'" "$PLIST"

          # Background modes: location + remote notifications
          $PB -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
          $PB -c "Add :UIBackgroundModes: string location" "$PLIST" 2>/dev/null || true
          $PB -c "Add :UIBackgroundModes: string remote-notification" "$PLIST" 2>/dev/null || true

          # App display name
          $PB -c "Set :CFBundleName ${APP_NAME}" "$PLIST" 2>/dev/null || \
          $PB -c "Add :CFBundleName string ${APP_NAME}" "$PLIST"
          $PB -c "Set :CFBundleDisplayName ${APP_NAME}" "$PLIST" 2>/dev/null || \
          $PB -c "Add :CFBundleDisplayName string ${APP_NAME}" "$PLIST"

          # Export compliance — app only uses standard HTTPS (exempt)
          $PB -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          $PB -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

      - name: Set up push notification entitlements
        script: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          PB="/usr/libexec/PlistBuddy"

          if [ ! -f "$ENTITLEMENTS" ]; then
            cat > "$ENTITLEMENTS" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict/>
          </plist>
          EOF
          fi

          $PB -c "Add :aps-environment string production" "$ENTITLEMENTS" 2>/dev/null || \
          $PB -c "Set :aps-environment production" "$ENTITLEMENTS"

      - name: Inject app icon
        script: |
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          curl -L -o /tmp/AppIcon-1024-raw.png "$APP_ICON_URL"

          # Strip alpha channel — Apple rejects icons with transparency
          # Flatten onto white background using macOS built-in Python3
          python3 -c "
          import subprocess, tempfile, os
          # Use sips to convert to JPEG (strips alpha), then back to PNG
          subprocess.run(['sips', '-s', 'format', 'jpeg', '/tmp/AppIcon-1024-raw.png', '--out', '/tmp/AppIcon-1024.jpg'], capture_output=True)
          subprocess.run(['sips', '-s', 'format', 'png', '/tmp/AppIcon-1024.jpg', '--out', '/tmp/AppIcon-1024.png'], capture_output=True)
          os.remove('/tmp/AppIcon-1024.jpg')
          print('Alpha channel stripped via JPEG round-trip')
          "

          # Generate all required iOS icon sizes using sips (built into macOS)
          for SPEC in "20:Icon-20" "40:Icon-20@2x" "60:Icon-20@3x" \
                      "29:Icon-29" "58:Icon-29@2x" "87:Icon-29@3x" \
                      "40:Icon-40" "80:Icon-40@2x" "120:Icon-40@3x" \
                      "120:Icon-60@2x" "180:Icon-60@3x" \
                      "76:Icon-76" "152:Icon-76@2x" "167:Icon-83.5@2x" \
                      "1024:Icon-1024"; do
            SIZE="${SPEC%%:*}"
            NAME="${SPEC##*:}"
            sips -z "$SIZE" "$SIZE" /tmp/AppIcon-1024.png --out "${ICON_DIR}/${NAME}.png" > /dev/null
          done

          cat > "${ICON_DIR}/Contents.json" <<'EOF'
          {
            "images": [
              {"size":"20x20","idiom":"iphone","filename":"Icon-20@2x.png","scale":"2x"},
              {"size":"20x20","idiom":"iphone","filename":"Icon-20@3x.png","scale":"3x"},
              {"size":"29x29","idiom":"iphone","filename":"Icon-29@2x.png","scale":"2x"},
              {"size":"29x29","idiom":"iphone","filename":"Icon-29@3x.png","scale":"3x"},
              {"size":"40x40","idiom":"iphone","filename":"Icon-40@2x.png","scale":"2x"},
              {"size":"40x40","idiom":"iphone","filename":"Icon-40@3x.png","scale":"3x"},
              {"size":"60x60","idiom":"iphone","filename":"Icon-60@2x.png","scale":"2x"},
              {"size":"60x60","idiom":"iphone","filename":"Icon-60@3x.png","scale":"3x"},
              {"size":"20x20","idiom":"ipad","filename":"Icon-20.png","scale":"1x"},
              {"size":"20x20","idiom":"ipad","filename":"Icon-20@2x.png","scale":"2x"},
              {"size":"29x29","idiom":"ipad","filename":"Icon-29.png","scale":"1x"},
              {"size":"29x29","idiom":"ipad","filename":"Icon-29@2x.png","scale":"2x"},
              {"size":"40x40","idiom":"ipad","filename":"Icon-40.png","scale":"1x"},
              {"size":"40x40","idiom":"ipad","filename":"Icon-40@2x.png","scale":"2x"},
              {"size":"76x76","idiom":"ipad","filename":"Icon-76.png","scale":"1x"},
              {"size":"76x76","idiom":"ipad","filename":"Icon-76@2x.png","scale":"2x"},
              {"size":"83.5x83.5","idiom":"ipad","filename":"Icon-83.5@2x.png","scale":"2x"},
              {"size":"1024x1024","idiom":"ios-marketing","filename":"Icon-1024.png","scale":"1x"}
            ],
            "info": {"version":1,"author":"codemagic"}
          }
          EOF

      - name: Fetch or create signing files
        script: |
          # Initialize keychain — must exist before certs can be saved
          keychain initialize
          # Fetch or create certificate + provisioning profile.
          # Uses CERTIFICATE_PRIVATE_KEY env var for cert creation.
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose
          # Install certs into keychain and apply profiles to Xcode project
          keychain add-certificates
          xcode-project use-profiles

      - name: Resolve App Store Connect app ID
        script: |
          # APP_STORE_APP_ID may already be passed from the ArborDash API.
          # If not, try to resolve it from App Store Connect.
          if [ -z "$APP_STORE_APP_ID" ]; then
            APP_STORE_APP_ID=$(app-store-connect apps list \
              --bundle-id-identifier "$APP_ID" --jsonapi \
              2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['id'] if d.get('data') else '')" \
              2>/dev/null || true)
          fi
          if [ -n "$APP_STORE_APP_ID" ]; then
            echo "APP_STORE_APP_ID=$APP_STORE_APP_ID" >> $CM_ENV
            echo "Resolved APP_STORE_APP_ID: $APP_STORE_APP_ID"
          else
            echo "WARNING: Could not resolve APP_STORE_APP_ID — will use build number 1"
          fi

      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          if [ -n "$APP_STORE_APP_ID" ]; then
            LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo "0")
          else
            LATEST="0"
          fi
          # Also check TestFlight builds which may not be reflected yet
          LATEST_TF=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo "0")
          # Use whichever is higher
          if [ "$LATEST_TF" -gt "$LATEST" ] 2>/dev/null; then
            LATEST="$LATEST_TF"
          fi
          NEXT=$(($LATEST + 1))
          echo "Latest from App Store Connect: $LATEST (TF: $LATEST_TF) → next: $NEXT"
          agvtool new-version -all "$NEXT"

      - name: Build IPA
        script: |
          # Capacitor 8 / SPM build — point at the .xcodeproj, not a workspace.
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

      - name: Set App Store metadata and upload screenshots
        script: |
          echo "=== Setting metadata for ${APP_NAME} ==="

          # Write a Python script that handles all metadata + screenshots
          # using the App Store Connect API. The Codemagic integration
          # provides APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID,
          # and APP_STORE_CONNECT_PRIVATE_KEY environment variables.
          python3 << 'PYEOF'
          import os, sys, json, time, hashlib, base64, struct
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError
          from datetime import datetime, timezone

          # --- JWT generation for App Store Connect API ---
          def b64url(data):
              if isinstance(data, str): data = data.encode()
              return base64.urlsafe_b64encode(data).rstrip(b'=').decode()

          def generate_jwt():
              import subprocess
              key_id = os.environ.get('APP_STORE_CONNECT_KEY_IDENTIFIER', '')
              issuer_id = os.environ.get('APP_STORE_CONNECT_ISSUER_ID', '')
              private_key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')

              if not all([key_id, issuer_id, private_key]):
                  print("WARNING: Missing App Store Connect credentials")
                  return None

              # Codemagic stores secrets as @file: references — resolve to actual content
              if private_key.startswith('@file:'):
                  file_path = private_key[6:]  # Strip '@file:' prefix
                  print(f"  Reading private key from file: {file_path}")
                  with open(file_path, "r") as f:
                      private_key = f.read()
              else:
                  # Fix escaped newlines from env var
                  private_key = private_key.replace('\\n', '\n')

              now = int(time.time())
              header = json.dumps({"alg": "ES256", "kid": key_id, "typ": "JWT"})
              payload = json.dumps({"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"})
              signing_input = f"{b64url(header)}.{b64url(payload)}"

              # Write key to temp file for openssl
              key_file = "/tmp/asc_key.p8"
              with open(key_file, "w") as f:
                  f.write(private_key)

              result = subprocess.run(
                  ["openssl", "dgst", "-sha256", "-sign", key_file],
                  input=signing_input.encode(), capture_output=True
              )
              os.unlink(key_file)

              if result.returncode != 0:
                  print(f"WARNING: JWT signing failed: {result.stderr.decode()}")
                  return None

              # Convert DER signature to raw r||s format for ES256
              der = result.stdout
              # Parse DER SEQUENCE { INTEGER r, INTEGER s }
              def parse_der_int(data, offset):
                  assert data[offset] == 0x02
                  length = data[offset + 1]
                  value = data[offset + 2:offset + 2 + length]
                  # Remove leading zero padding
                  while len(value) > 32 and value[0] == 0:
                      value = value[1:]
                  # Pad to 32 bytes
                  value = b'\x00' * (32 - len(value)) + value
                  return value, offset + 2 + length

              r, next_offset = parse_der_int(der, 2)  # Skip SEQUENCE header
              s, _ = parse_der_int(der, next_offset)
              raw_sig = r + s

              return f"{signing_input}.{b64url(raw_sig)}"

          def api_call(method, path, data=None, jwt=None):
              url = f"https://api.appstoreconnect.apple.com{path}"
              headers = {"Authorization": f"Bearer {jwt}", "Content-Type": "application/json"}
              body = json.dumps(data).encode() if data else None
              req = Request(url, data=body, headers=headers, method=method)
              try:
                  resp = urlopen(req)
                  return json.loads(resp.read().decode()) if resp.status != 204 else {}
              except HTTPError as e:
                  body = e.read().decode()
                  print(f"  API {method} {path} -> {e.code}: {body[:300]}")
                  return None

          # --- Main ---
          jwt = generate_jwt()
          if not jwt:
              print("ERROR: Could not generate JWT — skipping metadata")
              sys.exit(0)

          app_id = os.environ.get("APP_STORE_APP_ID", "")
          app_name = os.environ.get("APP_NAME", "ArborDash App")
          company_code = os.environ.get("COMPANY_CODE", "")
          build_dir = os.environ.get("CM_BUILD_DIR", ".")

          if not app_id:
              print("WARNING: No APP_STORE_APP_ID — skipping metadata")
              sys.exit(0)

          # 1. Get App Store Version
          print("Finding App Store version...")
          versions = api_call("GET", f"/v1/apps/{app_id}/appStoreVersions?limit=5", jwt=jwt)
          version_id = None
          if versions and versions.get("data"):
              for v in versions["data"]:
                  state = v.get("attributes", {}).get("appStoreState", "")
                  if state in ("PREPARE_FOR_SUBMISSION", "DEVELOPER_REJECTED", "REJECTED", "READY_FOR_REVIEW"):
                      version_id = v["id"]
                      break
              if not version_id:
                  version_id = versions["data"][0]["id"]
          if not version_id:
              print("WARNING: No App Store version found")
              sys.exit(0)
          print(f"  Version ID: {version_id}")

          # 2. Set Version Localizations
          print("Setting version localizations...")
          locs = api_call("GET", f"/v1/appStoreVersions/{version_id}/appStoreVersionLocalizations", jwt=jwt)
          en_loc_id = None
          if locs and locs.get("data"):
              for l in locs["data"]:
                  if l.get("attributes", {}).get("locale", "").startswith("en"):
                      en_loc_id = l["id"]
                      break
              if not en_loc_id:
                  en_loc_id = locs["data"][0]["id"]

          loc_attrs = {
              "description": f"Crew management and scheduling app for {app_name}. Manage jobs, schedules, estimates, invoices, and team coordination from your mobile device.",
              "keywords": "crew management,scheduling,field service,tree care,landscaping,job tracking",
              "supportUrl": "https://arbordash.app/support",
              "whatsNew": "Initial release",
          }

          if en_loc_id:
              print(f"  Updating localization {en_loc_id}...")
              api_call("PATCH", f"/v1/appStoreVersionLocalizations/{en_loc_id}", {
                  "data": {"id": en_loc_id, "type": "appStoreVersionLocalizations", "attributes": loc_attrs}
              }, jwt=jwt)
          else:
              print("  Creating en-US localization...")
              loc_attrs["locale"] = "en-US"
              resp = api_call("POST", f"/v1/appStoreVersions/{version_id}/appStoreVersionLocalizations", {
                  "data": {"type": "appStoreVersionLocalizations", "attributes": loc_attrs}
              }, jwt=jwt)
              if resp and resp.get("data"):
                  en_loc_id = resp["data"]["id"]

          # 3. Set App Info (privacy policy, category)
          print("Setting app info...")
          app_infos = api_call("GET", f"/v1/apps/{app_id}/appInfos?limit=1", jwt=jwt)
          if app_infos and app_infos.get("data"):
              ai_id = app_infos["data"][0]["id"]

              # Set category
              api_call("PATCH", f"/v1/appInfos/{ai_id}", {
                  "data": {"id": ai_id, "type": "appInfos", "relationships": {
                      "primaryCategory": {"data": {"type": "appCategories", "id": "BUSINESS"}}
                  }}
              }, jwt=jwt)

              # Set privacy policy on localization
              ai_locs = api_call("GET", f"/v1/appInfos/{ai_id}/appInfoLocalizations", jwt=jwt)
              if ai_locs and ai_locs.get("data"):
                  for ail in ai_locs["data"]:
                      if ail.get("attributes", {}).get("locale", "").startswith("en"):
                          api_call("PATCH", f"/v1/appInfoLocalizations/{ail['id']}", {
                              "data": {"id": ail["id"], "type": "appInfoLocalizations", "attributes": {
                                  "privacyPolicyUrl": "https://arbordash.app/privacy"
                              }}
                          }, jwt=jwt)
                          break

          # 4. Set Age Rating (all NONE)
          print("Setting age rating...")
          ar = api_call("GET", f"/v1/appStoreVersions/{version_id}/ageRatingDeclaration", jwt=jwt)
          if ar and ar.get("data"):
              ar_id = ar["data"]["id"]
              api_call("PATCH", f"/v1/ageRatingDeclarations/{ar_id}", {
                  "data": {"id": ar_id, "type": "ageRatingDeclarations", "attributes": {
                      "alcoholTobaccoOrDrugUseOrReferences": "NONE",
                      "contests": "NONE", "gamblingSimulated": "NONE", "gambling": False,
                      "horrorOrFearThemes": "NONE", "matureOrSuggestiveThemes": "NONE",
                      "medicalOrTreatmentInformation": "NONE", "profanityOrCrudeHumor": "NONE",
                      "sexualContentGraphicAndNudity": "NONE", "sexualContentOrNudity": "NONE",
                      "violenceCartoonOrFantasy": "NONE", "violenceRealistic": "NONE",
                      "violenceRealisticProlongedGraphicOrSadistic": "NONE",
                      "unrestrictedWebAccess": False, "ageRatingOverride": None,
                  }}
              }, jwt=jwt)

          # 5. Set Review Details
          print("Setting review details...")
          review_resp = api_call("POST", "/v1/appStoreReviewDetails", {
              "data": {"type": "appStoreReviewDetails", "attributes": {
                  "contactFirstName": "Rick", "contactLastName": "Courcy",
                  "contactEmail": "rick@madebyrick.com", "contactPhone": "+12077544024",
                  "demoAccountRequired": False,
                  "notes": f"White-labeled crew management app for {app_name}. Unlisted distribution to company employees only."
              }, "relationships": {"appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}}}}
          }, jwt=jwt)

          # 6. Upload Screenshots
          print("Uploading screenshots...")
          screenshot_map = {
              "APP_IPHONE_65": os.path.join(build_dir, "screenshots/iOS/ArborDash-Screenshot_(iPhone 6.5).png"),
              "APP_IPAD_PRO_3GEN_129": os.path.join(build_dir, "screenshots/iOS/ArborDash-Screenshot_(iPad Pro 12.9).png"),
          }

          if not en_loc_id:
              print("  WARNING: No localization ID — skipping screenshots")
          else:
              for display_type, file_path in screenshot_map.items():
                  if not os.path.exists(file_path):
                      print(f"  WARNING: {file_path} not found — skipping {display_type}")
                      continue

                  file_size = os.path.getsize(file_path)
                  file_name = os.path.basename(file_path)
                  print(f"  Uploading {file_name} as {display_type} ({file_size} bytes)...")

                  # Check for existing screenshot set
                  sets = api_call("GET", f"/v1/appStoreVersionLocalizations/{en_loc_id}/appScreenshotSets", jwt=jwt)
                  set_id = None
                  if sets and sets.get("data"):
                      for s in sets["data"]:
                          if s.get("attributes", {}).get("screenshotDisplayType") == display_type:
                              set_id = s["id"]
                              # Check if screenshots already exist in this set
                              existing = api_call("GET", f"/v1/appScreenshotSets/{set_id}/appScreenshots", jwt=jwt)
                              if existing and existing.get("data") and len(existing["data"]) > 0:
                                  print(f"    Screenshot already exists for {display_type} — skipping")
                                  set_id = "SKIP"
                              break

                  if set_id == "SKIP":
                      continue

                  # Create set if needed
                  if not set_id:
                      resp = api_call("POST", "/v1/appScreenshotSets", {
                          "data": {"type": "appScreenshotSets", "attributes": {"screenshotDisplayType": display_type},
                              "relationships": {"appStoreVersionLocalization": {"data": {"type": "appStoreVersionLocalizations", "id": en_loc_id}}}}
                      }, jwt=jwt)
                      if resp and resp.get("data"):
                          set_id = resp["data"]["id"]

                  if not set_id:
                      print(f"    WARNING: Could not create screenshot set for {display_type}")
                      continue

                  # Reserve upload
                  reserve = api_call("POST", "/v1/appScreenshots", {
                      "data": {"type": "appScreenshots", "attributes": {"fileName": file_name, "fileSize": file_size},
                          "relationships": {"appScreenshotSet": {"data": {"type": "appScreenshotSets", "id": set_id}}}}
                  }, jwt=jwt)

                  if not reserve or not reserve.get("data"):
                      print(f"    WARNING: Could not reserve upload for {display_type}")
                      continue

                  ss_id = reserve["data"]["id"]
                  ops = reserve["data"].get("attributes", {}).get("uploadOperations", [])

                  if not ops:
                      print(f"    WARNING: No upload operations returned for {display_type}")
                      continue

                  # Upload each part
                  with open(file_path, "rb") as f:
                      file_data = f.read()

                  for op in ops:
                      url = op["url"]
                      headers_list = {h["name"]: h["value"] for h in op.get("requestHeaders", [])}
                      offset = op.get("offset", 0)
                      length = op.get("length", len(file_data))
                      chunk = file_data[offset:offset + length]

                      req = Request(url, data=chunk, headers=headers_list, method="PUT")
                      try:
                          urlopen(req)
                      except HTTPError as e:
                          print(f"    WARNING: Upload PUT failed: {e.code}")

                  # Compute MD5 checksum
                  md5 = hashlib.md5(file_data).digest()
                  checksum = base64.b64encode(md5).decode()

                  # Commit
                  api_call("PATCH", f"/v1/appScreenshots/{ss_id}", {
                      "data": {"id": ss_id, "type": "appScreenshots", "attributes": {"uploaded": True, "sourceFileChecksum": checksum}}
                  }, jwt=jwt)
                  print(f"    Uploaded {file_name}")

          print("=== Metadata and screenshots complete ===")
          PYEOF

      - name: Upload IPA to App Store Connect
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA found"
            exit 1
          fi
          echo "Uploading $IPA_PATH to App Store Connect..."
          app-store-connect publish --path "$IPA_PATH"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - rick@madebyrick.com
        notify:
          success: true
          failure: true
      scripts:
        - name: Notify ArborDash API on build completion
          script: |
            # CM_BUILD_STEP_STATUS is the authoritative source — "success" or "failure"
            if [ "${CM_BUILD_STEP_STATUS}" = "success" ]; then
              BUILD_RESULT="success"
            else
              BUILD_RESULT="failure"
            fi
            echo "Build result: ${BUILD_RESULT} (step status: ${CM_BUILD_STEP_STATUS})"
            curl -s -X POST "https://api.arbordash.app/api/app-builds/webhook" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${WEBHOOK_SECRET}" \
              --data '{
                "buildId": "'"${CM_BUILD_ID}"'",
                "status": "'"${BUILD_RESULT}"'",
                "artifactLinks": '"${CM_ARTIFACT_LINKS:-[]}"',
                "companyCode": "'"${COMPANY_CODE}"'",
                "appName": "'"${APP_NAME}"'",
                "arbordashBuildId": "'"${ARBORDASH_BUILD_ID}"'"
              }' || true

  # ---------------------------------------------------------------------------
  # Android Workflow
  # ---------------------------------------------------------------------------
  android-build:
    name: Android — Signed APK
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      android_signing:
        - arbordash_keystore

      groups:
        - app_config
        - webhook_config

      node: v22
      java: 21

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "android-*"
          include: true

    scripts:

      - name: Install npm dependencies
        script: npm install

      - name: Ensure www dir exists
        script: |
          mkdir -p www
          [ -f www/index.html ] || echo '<html></html>' > www/index.html

      - name: Fix APP_ID for Android (Java reserved words)
        script: |
          # Replace Java reserved keywords in APP_ID and persist for subsequent steps
          if echo "$APP_ID" | grep -qE '\.(default|class|int|public|private|static|void|return)(\.|$)'; then
            FIXED_APP_ID=$(echo "$APP_ID" | sed 's/\.default/\.main/g')
            echo "APP_ID=$FIXED_APP_ID" >> $CM_ENV
            echo "Fixed APP_ID for Android: $APP_ID -> $FIXED_APP_ID"
          fi

      - name: Add Android platform and sync
        script: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Inject google-services.json and FCM Gradle plugin
        script: |
          if [ -n "${GOOGLE_SERVICES_JSON}" ]; then
            echo "${GOOGLE_SERVICES_JSON}" > android/app/google-services.json
            # Patch package name to match the Android APP_ID (may differ from iOS)
            sed -i.bak "s/\"package_name\": *\"[^\"]*\"/\"package_name\": \"${APP_ID}\"/g" android/app/google-services.json
            echo "google-services.json written with package_name=$APP_ID"

            # Add Google Services Gradle plugin to project-level build.gradle
            ROOT_GRADLE="android/build.gradle"
            if ! grep -q "com.google.gms" "$ROOT_GRADLE"; then
              sed -i.bak "s|classpath 'com.android.tools.build:gradle:|classpath 'com.google.gms:google-services:4.4.2'\n            classpath 'com.android.tools.build:gradle:|" "$ROOT_GRADLE"
              echo "Added google-services classpath to root build.gradle"
            fi

            # Apply the plugin in app-level build.gradle
            APP_GRADLE="android/app/build.gradle"
            if ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
              echo "" >> "$APP_GRADLE"
              echo "apply plugin: 'com.google.gms.google-services'" >> "$APP_GRADLE"
              echo "Added google-services plugin to app build.gradle"
            fi

            # Add Firebase Messaging dependency
            if ! grep -q "firebase-messaging" "$APP_GRADLE"; then
              sed -i.bak "/^dependencies {/a\\    implementation platform('com.google.firebase:firebase-bom:33.7.0')\n    implementation 'com.google.firebase:firebase-messaging'" "$APP_GRADLE"
              echo "Added Firebase Messaging dependencies"
            fi
          else
            echo "WARNING: No GOOGLE_SERVICES_JSON — push notifications will not work"
          fi

      - name: Set Android SDK location
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Patch AndroidManifest.xml
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # App display name
          sed -i.bak "s/android:label=\"[^\"]*\"/android:label=\"${APP_NAME}\"/" "$MANIFEST"

          # Background geolocation + microphone permissions
          for PERM in "ACCESS_FINE_LOCATION" "ACCESS_BACKGROUND_LOCATION" \
                      "FOREGROUND_SERVICE" "FOREGROUND_SERVICE_LOCATION" \
                      "POST_NOTIFICATIONS" "RECORD_AUDIO" "MODIFY_AUDIO_SETTINGS"; do
            if ! grep -q "$PERM" "$MANIFEST"; then
              sed -i.bak "s|<application|<uses-permission android:name=\"android.permission.${PERM}\"/>\n    <application|" "$MANIFEST"
            fi
          done

      - name: Inject Android app icon
        script: |
          curl -L -o /tmp/ic_launcher_master.png "$APP_ICON_URL"
          RES_DIR="android/app/src/main/res"

          # Remove adaptive icon XML files — Capacitor generates these by default
          # and they override any PNG ic_launcher files. We want our branded PNGs.
          find "$RES_DIR" -path "*/mipmap-anydpi-v26/ic_launcher*.xml" -delete 2>/dev/null || true
          rm -f "$RES_DIR/drawable/ic_launcher_background.xml" 2>/dev/null || true
          rm -f "$RES_DIR/drawable-v24/ic_launcher_foreground.xml" 2>/dev/null || true
          rm -f "$RES_DIR/drawable/ic_launcher_foreground.xml" 2>/dev/null || true

          for SPEC in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" \
                      "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            FOLDER="${SPEC%%:*}"
            SIZE="${SPEC##*:}"
            mkdir -p "${RES_DIR}/${FOLDER}"
            sips -z "$SIZE" "$SIZE" /tmp/ic_launcher_master.png \
              --out "${RES_DIR}/${FOLDER}/ic_launcher.png" > /dev/null
            cp "${RES_DIR}/${FOLDER}/ic_launcher.png" \
               "${RES_DIR}/${FOLDER}/ic_launcher_round.png"
          done

      - name: Set version and signing config
        script: |
          GRADLE="android/app/build.gradle"

          # Inject version
          sed -i.bak "s/versionCode .*/versionCode $BUILD_NUMBER/" "$GRADLE"
          sed -i.bak "s/versionName .*/versionName \"1.0.$BUILD_NUMBER\"/" "$GRADLE"

          # Debug: show available CM signing env vars
          echo "CM_KEYSTORE_PATH=${CM_KEYSTORE_PATH:-not set}"
          echo "CM_KEYSTORE=${CM_KEYSTORE:-not set}"
          echo "CM_KEY_ALIAS=${CM_KEY_ALIAS:-not set}"

          # Resolve keystore path (Codemagic uses CM_KEYSTORE_PATH or CM_KEYSTORE)
          KS_PATH="${CM_KEYSTORE_PATH:-$CM_KEYSTORE}"
          if [ -z "$KS_PATH" ] || [ ! -f "$KS_PATH" ]; then
            echo "ERROR: No keystore found at CM_KEYSTORE_PATH or CM_KEYSTORE"
            exit 1
          fi

          # Inject signing config with actual values (shell-expanded)
          cat >> "$GRADLE" <<SIGNING

          android {
              signingConfigs {
                  release {
                      storeFile file("${KS_PATH}")
                      storePassword "${CM_KEYSTORE_PASSWORD}"
                      keyAlias "${CM_KEY_ALIAS}"
                      keyPassword "${CM_KEY_PASSWORD}"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          SIGNING

      - name: Build signed APK
        script: cd android && ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - rick@madebyrick.com
        notify:
          success: true
          failure: true
      scripts:
        - name: Notify ArborDash API on build completion
          script: |
            # Determine build result — check for APK artifact as primary signal
            APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
            if [ -n "$APK_PATH" ]; then
              BUILD_RESULT="success"
            elif [ "${CM_BUILD_STEP_STATUS}" = "success" ]; then
              BUILD_RESULT="success"
            else
              BUILD_RESULT="failure"
            fi
            echo "Build result: ${BUILD_RESULT} (APK found: ${APK_PATH:-none}, step status: ${CM_BUILD_STEP_STATUS:-empty})"
            RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "https://api.arbordash.app/api/app-builds/webhook" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${WEBHOOK_SECRET}" \
              --data '{
                "buildId": "'"${CM_BUILD_ID}"'",
                "status": "'"${BUILD_RESULT}"'",
                "artifactLinks": '"${CM_ARTIFACT_LINKS:-[]}"',
                "companyCode": "'"${COMPANY_CODE}"'",
                "appName": "'"${APP_NAME}"'",
                "arbordashBuildId": "'"${ARBORDASH_BUILD_ID}"'"
              }') || true
            echo "Webhook response: $RESPONSE"
